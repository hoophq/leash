# Leash recommended rulepack.
#
# Philosophy: a guardrail that produces false positives gets uninstalled. Only
# unambiguous, almost-never-intentional catastrophes are denied outright; for
# anything a developer might legitimately mean, we ask for confirmation instead
# of blocking. Everyday operations (rm -rf node_modules, rm -rf ./dist, rm -rf *)
# are deliberately NOT matched.
name: recommended
default: allow

rules:
  - id: destructive-delete-sensitive
    description: Recursive delete targeting home, root, or a system location
    severity: critical
    effect: deny
    message: >-
      Leash blocked a recursive delete aimed at a sensitive location
      (home, root, or a system path). This is almost never what you want from an
      agent. If you really mean it, run the command yourself.
    match:
      shell:
        recursive_delete: true
        delete_target: sensitive

  - id: destructive-delete-outside-workspace
    description: Recursive delete pointing outside the current workspace
    severity: high
    effect: ask
    message: >-
      This recursive delete points outside your workspace. Confirm the target is
      correct before allowing it.
    match:
      shell:
        recursive_delete: true
        delete_target: outside_workspace

  - id: chmod-world-writable-sensitive
    description: Making home, root, or a system location world-writable
    severity: critical
    effect: deny
    message: >-
      Leash blocked a chmod that makes a sensitive location (home, root, or a
      system path) world-writable. This is almost never intended.
    match:
      shell:
        chmod_world_writable: true
        chmod_target: sensitive

  - id: chmod-world-writable
    description: Making files world-writable (chmod 777 / o+w)
    severity: medium
    effect: ask
    message: >-
      This makes files world-writable — anyone on the machine can modify them.
      Confirm this is intended.
    match:
      shell:
        chmod_world_writable: true

  - id: destructive-disk-write
    description: Destructive write to a raw disk or block device (dd, mkfs, or redirect)
    severity: critical
    effect: deny
    message: >-
      Leash blocked a destructive write to a raw disk or block device (via dd,
      mkfs, or a redirect to /dev/sd*, /dev/nvme*, /dev/disk*, …). This wipes the
      target irreversibly and is almost never intended from an agent. If you
      really mean it, run the command yourself.
    match:
      shell:
        block_device_write: true

  - id: pipe-to-shell-from-network
    description: Piping a network download directly into a shell or interpreter
    severity: high
    effect: ask
    message: >-
      A downloaded script is being piped straight into a shell (curl ... | sh).
      Inspect the source before running it.
    match:
      shell:
        pipe_to_shell: true

  - id: secret-exfiltration-high
    description: Reading a private key or cloud credential and sending it to the network
    severity: critical
    effect: deny
    message: >-
      Leash blocked likely credential exfiltration — a private key or cloud
      credential is being read and routed to the network. If this is genuinely
      intended, run it yourself.
    match:
      shell:
        secret_exfil: high

  # `any` also matches high-confidence exfil, but secret-exfiltration-high (deny)
  # outranks this rule via deny-overrides — so keys/cloud-creds are denied while
  # a .env read only asks.
  - id: secret-exfiltration-env
    description: Reading a secret or .env file and sending it to the network
    severity: high
    effect: ask
    message: >-
      A secret file is being read and sent to the network. Confirm this is
      intended before allowing it.
    match:
      shell:
        secret_exfil: any

  - id: secret-read-into-context
    description: Dumping a private key or cloud credential into the agent's context
    severity: high
    effect: ask
    message: >-
      A private key or cloud credential is being dumped to stdout (cat, base64,
      …), which reads its contents into the agent's context. Confirm this is
      intended — the disclosure cannot be undone once the command runs.
    match:
      shell:
        secret_read: high

  - id: git-force-push
    description: Force-push can irreversibly overwrite remote history
    severity: medium
    effect: ask
    message: >-
      Force-push detected. This can overwrite history others depend on. Prefer
      --force-with-lease, or confirm if you are sure.
    match:
      shell:
        force_push: true

  - id: git-destructive-history
    description: "git reset --hard / git clean -fd discards work irreversibly"
    severity: medium
    effect: ask
    message: >-
      This git command permanently discards uncommitted work. Confirm before
      continuing.
    match:
      shell:
        history_rewrite: true

  - id: fork-bomb
    description: Classic shell fork bomb
    severity: critical
    effect: deny
    message: Leash blocked what looks like a fork bomb.
    match:
      shell:
        fork_bomb: true

  - id: read-credential-files
    description: Reading private keys or cloud credentials (their contents enter the agent's context)
    severity: high
    effect: ask
    message: >-
      An agent is reading private-key or cloud-credential material. Its contents
      would enter the model context. Confirm this is intended.
    match:
      tool: [file_read]
      path_glob:
        - "~/.ssh/id_rsa"
        - "~/.ssh/id_dsa"
        - "~/.ssh/id_ecdsa"
        - "~/.ssh/id_ed25519"
        - "~/.aws/credentials"
        - "~/.config/gcloud/**"
        - "~/.kube/config"
        - "**/*.pem"
        - "**/*.key"

  - id: write-credential-files
    description: Writing or overwriting credential, key, or secret files
    severity: high
    effect: ask
    message: >-
      An edit targets credential or secret material (SSH keys, cloud
      credentials, or a .env file). Confirm this is intended.
    match:
      tool: [file_write]
      path_glob:
        - "~/.ssh/**"
        - "~/.aws/**"
        - "~/.config/gcloud/**"
        - "~/.kube/config"
        - "**/.env"
        - "**/.env.*"

  - id: write-shell-profile
    description: Modifying shell startup files or git hooks (persistence vectors)
    severity: medium
    effect: ask
    message: >-
      An edit targets a shell startup file or git hook. These run automatically
      and are a common persistence vector. Confirm this is intended.
    match:
      tool: [file_write]
      path_glob:
        - "~/.bashrc"
        - "~/.zshrc"
        - "~/.profile"
        - "~/.bash_profile"
        - "~/.zprofile"
        - "**/.git/hooks/**"
