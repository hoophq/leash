name: Bug report
description: "Something else is broken — install, init, hooks, registry commands, output."
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: Include the command you ran and any stderr — Fence logs its warnings there.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Fence version
      description: "`fence version`"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS + how you installed (brew / npm / release binary), and the agent if relevant (e.g. Claude Code x.y).
      placeholder: "macOS 15, brew, Claude Code 2.1"
    validations:
      required: false
