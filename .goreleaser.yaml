# GoReleaser config — cross-platform release builds + a Homebrew formula.
# Validate locally with `goreleaser check`; a real release runs on a `v*` tag
# via .github/workflows/release.yml.
version: 2

project_name: fence

before:
  hooks:
    - go mod tidy

builds:
  - id: fence
    main: ./cmd/fence
    binary: fence
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    # Match the Makefile: strip symbols and inject the version into main.version.
    ldflags:
      - -s -w -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: fence
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"

# Publish a Homebrew Cask to hoophq/homebrew-tap so macOS users can
# `brew install hoophq/tap/fence`. Casks (not formulae) are GoReleaser's
# supported path for pre-built binaries; Linux users get the tarball, `go
# install`, or npx.
# Requires HOMEBREW_TAP_GITHUB_TOKEN (a PAT with write access to the tap) at
# release time.
homebrew_casks:
  - name: fence
    repository:
      owner: hoophq
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/hoophq/fence"
    description: "Guardrails for AI coding agents — blocks catastrophic tool calls before they run"
    # Homebrew quarantines cask downloads, and Gatekeeper SIGKILLs the ad-hoc
    # (linker-signed) Go binary on first run — install succeeds, running dies.
    # Strip the quarantine bit post-install (GoReleaser's documented pattern)
    # until the binary is properly signed + notarized.
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/fence"]
          end
