# Example custom rulepack.
#
# Layer your own rules on top of the recommended pack by saving a file like this
# as ./.fence.yaml in a project (auto-discovered), or by passing it explicitly:
#
#   fence check --rules ./examples/custom-rules.yaml 'terraform destroy'
#
# Rules here are evaluated together with the recommended pack. When several rules
# match, the most severe effect wins (deny > ask > warn > allow).
schema: 1
name: custom-example
default: allow

# Retune existing rules by id — only the effect changes. Great for softening or
# strengthening the built-in recommended rules without copying them.
overrides:
  git-force-push: deny                  # make force-push a hard block, not a prompt
  # destructive-delete-sensitive: ask   # e.g. soften the home/root delete block
  # pipe-to-shell-from-network: allow   # e.g. allow curl | sh

rules:
  # Block destructive infrastructure commands outright.
  - id: no-terraform-destroy
    description: terraform destroy tears down real infrastructure
    severity: critical
    effect: deny
    message: terraform destroy is blocked here. Run it from a reviewed pipeline.
    match:
      shell:
        command_in: [terraform]
      regex: '\bterraform\b.*\bdestroy\b'

  # Ask before talking to production databases from the agent.
  - id: confirm-prod-psql
    description: Connecting to a production database
    severity: high
    effect: ask
    match:
      shell:
        command_in: [psql, mysql, mongosh]
      regex: '(prod|production)'

  # Warn (but allow) when installing global npm packages.
  - id: warn-global-npm
    description: Global npm installs change the machine outside the project
    severity: low
    effect: warn
    match:
      regex: '\bnpm\s+(i|install)\b.*\s-g\b'
